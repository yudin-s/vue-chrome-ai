name: Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - examples/chrome-ai-studio/**
      - .github/workflows/pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - run: npm install --no-audit --no-fund
        working-directory: examples/chrome-ai-studio
      - run: npm run build
        working-directory: examples/chrome-ai-studio
      - uses: actions/upload-pages-artifact@v3
        with:
          path: examples/chrome-ai-studio/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
